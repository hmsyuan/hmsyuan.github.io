title: The Lost
description: HMS's website
theme: just-the-docs

url: https://hmsyuan.github.io

aux_links:
  github: https://github.com/hmsyuan/hmsyuan.github.io
  facebook: https://www.facebook.com/mingsyuan.ho/  

# Makes Aux links open in a new tab. Default is false
aux_links_new_tab: true

# website's logo and favicon
# logo: ""
# favicon_ico: ""

# footer content
# markup / liquid-based content.
footer_content: "本網站內容以 CC-BY 4.0 釋出"

# color:light(default) and dark 
color_scheme: light

# page and post default
# layout setting about jekyll can refer:https://jekyllrb.com/docs/configuration/front-matter-defaults/
defaults:
  -
    scopes:
      path: "" # an empty string here means all files in the project
      type: "pages"
    values:
      layout: "default"
  -
    scopes:
      path: ""
      type: "posts"
    values:
      layout: "default"
      author: "HMS"

# Search Function
search_enabled: true
search:
  # Split pages into sections that can be searched individually
  # Supports 1 - 6, default: 2
  heading_level: 2
  # Maximum amount of previews per search result
  # Default: 3
  previews: 3
  # Maximum amount of words to display before a matched word in the preview
  # Default: 5
  preview_words_before: 4
  # Maximum amount of words to display after a matched word in the preview
  # Default: 10
  preview_words_after: 4
  # Set the search token separator
  # Default: /[\s\-/]+/
  # Example: enable support for hyphenated search words
  tokenizer_separator: /[\s/]+/
  # Display the relative url in search results
  # Supports true (default) or false
  rel_url: true
  # Enable or disable the search button that appears in the bottom right corner of every page
  # Supports true or false (default)
  button: false
